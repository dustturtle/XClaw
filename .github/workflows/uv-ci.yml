name: uv-ci

on:
  push:
    branches:
      - main
      - master
      - copilot/**
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@v8
        with:
          version: "0.11.8"
          enable-cache: true

      - name: Run uv build validation
        run: bash /home/runner/work/XClaw/XClaw/scripts/uv-build.sh
